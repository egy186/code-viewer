version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      eslint:
        patterns:
          - '@egy186/eslint-config'
          - eslint
          - eslint-import-resolver-typescript
          - typescript-eslint
      parcel:
        patterns:
          - '@parcel/*'
          - parcel
    cooldown:
      default-days: 3
      exclude:
        - '@egy186/*'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
